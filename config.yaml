# OpenTrack UDP数据发送器配置
web:
  port: 24242
  host: "0.0.0.0"
  debug: false

udp:
  port: 4242
  host: "127.0.0.1"
  broadcast_frequency: 20  # Hz

data:
  # XYZ范围 [-600, 600]
  x_range: [-600, 600]
  y_range: [-600, 600]
  z_range: [-600, 600]

  # 旋转范围 [-180, 180]
  yaw_range: [-180, 180]
  pitch_range: [-90, 90] # 俯仰轴绝对值超过90会有奇奇怪怪的问题
  roll_range: [-180, 180]